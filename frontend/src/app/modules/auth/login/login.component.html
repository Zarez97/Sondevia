<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 12h6M9 16h4"/>
        </svg>
      </div>
      <h1 class="login-title">Sistema de Encuestas</h1>
      <p class="login-subtitle">Inicia sesión para continuar</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form" novalidate>

      <div class="field-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="correo@ejemplo.com"
          [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched"
          autocomplete="email"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="field-error">Ingresa un correo válido.</span>
        }
      </div>

      <div class="field-group">
        <label for="contrasenia">Contraseña</label>
        <input
          id="contrasenia"
          type="password"
          formControlName="contrasenia"
          placeholder="••••••••"
          [class.input-error]="form.get('contrasenia')?.invalid && form.get('contrasenia')?.touched"
          autocomplete="current-password"
        />
        @if (form.get('contrasenia')?.invalid && form.get('contrasenia')?.touched) {
          <span class="field-error">La contraseña es obligatoria.</span>
        }
      </div>

      @if (errorMessage) {
        <div class="alert-error">{{ errorMessage }}</div>
      }

      <button type="submit" class="btn-login" [disabled]="loading">
        @if (loading) {
          <span class="spinner"></span> Ingresando...
        } @else {
          Iniciar sesión
        }
      </button>

    </form>
  </div>
</div>
