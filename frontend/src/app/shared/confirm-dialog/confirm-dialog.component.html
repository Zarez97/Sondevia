@if (confirm.state(); as s) {
  <div class="cd-overlay" (click)="confirm.resolve(false)">
    <div class="cd-dialog" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">

      <div class="cd-icon cd-icon-{{ s.variant }}">
        @switch (s.variant) {
          @case ('danger') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          }
          @case ('warning') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          }
          @case ('primary') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
          }
          @default {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          }
        }
      </div>

      <h3 class="cd-title">{{ s.title }}</h3>
      <p class="cd-message">{{ s.message }}</p>

      <div class="cd-actions">
        @if (s.showCancel) {
          <button class="cd-btn cd-cancel" (click)="confirm.resolve(false)">{{ s.cancelText }}</button>
        }
        <button class="cd-btn cd-confirm cd-confirm-{{ s.variant }}" (click)="confirm.resolve(true)">
          {{ s.confirmText }}
        </button>
      </div>

    </div>
  </div>
}
