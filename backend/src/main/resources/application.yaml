spring:
  application:
    name: sistema-encuestas

  datasource:
    url: ${DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      fail-on-empty-beans: false

  mail:
  host: smtp.gmail.com
  port: 587
  username: notificaciones.sondevia@gmail.com
  password: ${GMAIL_PASSWORD} 
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

  server:
    port: 8080

jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  expiration: 86400000
